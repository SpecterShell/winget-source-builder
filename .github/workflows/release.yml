name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Release (windows-x64)
    runs-on: windows-2025
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add vcpkg to PATH
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner."
          }
          $env:VCPKG_INSTALLATION_ROOT | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Rust CLI
        run: cargo build --release --verbose --target x86_64-pc-windows-msvc

      - name: Stage release archive
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/x86_64-pc-windows-msvc/release/winget-source-builder.exe" "dist/winget-source-builder.exe"
          Copy-Item "target/x86_64-pc-windows-msvc/release/WinGetUtil.dll" "dist/WinGetUtil.dll"
          Copy-Item "LICENSE" "dist/LICENSE"
          Copy-Item "AGENTS.md" "dist/AGENTS.md"
          Copy-Item "README.md" "dist/README.md"
          Copy-Item "README.zh-CN.md" "dist/README.zh-CN.md"
          Copy-Item "README.zh-TW.md" "dist/README.zh-TW.md"
          Copy-Item "docs" "dist/docs" -Recurse
          Copy-Item "action.yml" "dist/action.yml"
          Compress-Archive -Path "dist/*" -DestinationPath "winget-source-builder-windows-x64.zip" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: winget-source-builder-windows-x64
          path: winget-source-builder-windows-x64.zip
          if-no-files-found: error

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: winget-source-builder-windows-x64.zip

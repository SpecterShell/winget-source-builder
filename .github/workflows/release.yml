name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  MAKEMSIX_BUILD_JOBS: 4

jobs:
  build-release:
    name: Release (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            artifact_name: winget-source-builder-linux-x86_64
            archive_name: winget-source-builder-linux-x86_64.tar.gz
          - name: linux-aarch64
            os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            artifact_name: winget-source-builder-linux-aarch64
            archive_name: winget-source-builder-linux-aarch64.tar.gz
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: winget-source-builder-macos-aarch64
            archive_name: winget-source-builder-macos-aarch64.tar.gz
          - name: macos-x86_64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: winget-source-builder-macos-x86_64
            archive_name: winget-source-builder-macos-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            artifact_name: winget-source-builder-windows-x86_64
            archive_name: winget-source-builder-windows-x86_64.zip
          - name: windows-aarch64
            os: windows-2025
            target: aarch64-pc-windows-msvc
            artifact_name: winget-source-builder-windows-aarch64
            archive_name: winget-source-builder-windows-aarch64.zip
          - name: windows-i686
            os: windows-2025
            target: i686-pc-windows-msvc
            artifact_name: winget-source-builder-windows-i686
            archive_name: winget-source-builder-windows-i686.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Initialize required submodules
        shell: bash
        run: |
          set -euo pipefail
          git -c submodule.recurse=false submodule sync -- winget-cli msix-packaging
          git -c submodule.recurse=false submodule update --init --depth 1 winget-cli msix-packaging

      - name: Add vcpkg to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_INSTALLATION_ROOT) {
            throw "VCPKG_INSTALLATION_ROOT is not set on this runner."
          }
          $env:VCPKG_INSTALLATION_ROOT | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross
        if: runner.os == 'Linux'
        run: cargo install cross --locked

      - name: Build Rust CLI
        if: runner.os == 'Linux'
        run: cross build --release --verbose --target ${{ matrix.target }}

      - name: Build Rust CLI
        if: runner.os != 'Linux'
        run: cargo build --release --verbose --target ${{ matrix.target }}

      - name: Stage release archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/winget-source-builder.exe" "dist/winget-source-builder.exe"
          Copy-Item "target/${{ matrix.target }}/release/WinGetUtil.dll" "dist/WinGetUtil.dll"
          Compress-Archive -Path "dist/*" -DestinationPath "${{ matrix.archive_name }}" -Force

      - name: Stage release archive
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/winget-source-builder" "dist/winget-source-builder"
          chmod +x "dist/winget-source-builder"
          if [[ -f "target/${{ matrix.target }}/release/makemsix" ]]; then
            cp "target/${{ matrix.target }}/release/makemsix" "dist/makemsix"
            chmod +x "dist/makemsix"
          fi
          find "target/${{ matrix.target }}/release" -maxdepth 1 \( -name 'libmsix*.so*' -o -name 'libmsix*.dylib*' \) -type f -exec cp {} dist/ \;
          tar -czf "${{ matrix.archive_name }}" -C dist .

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist
          if-no-files-found: error

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}

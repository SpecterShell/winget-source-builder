name: Build WinGet Source
description: Build a static WinGet source tree with source2.msix, package sidecars, and hosted merged manifests.

inputs:
  repo:
    description: Path to the manifest repository or manifests root.
    required: true
  state:
    description: Path to the persistent builder state directory.
    required: true
  out:
    description: Path to the publish output directory.
    required: true
  workspace-root:
    description: Root directory containing packaging/ for the source being built.
    required: true
  format:
    description: Catalog format to build.
    required: false
    default: v2
  lang:
    description: Locale for user-facing logs.
    required: false
    default: en

outputs:
  publish-root:
    description: Publish output directory produced by the action.
    value: ${{ inputs.out }}

runs:
  using: composite
  steps:
    - name: Ensure Windows runner
      shell: pwsh
      run: |
        if (-not $IsWindows) {
          throw "winget-source-builder GitHub Action currently requires a Windows runner."
        }

    - name: Checkout action source with submodules
      uses: actions/checkout@v4
      with:
        repository: ${{ github.action_repository }}
        ref: ${{ github.action_ref }}
        path: ${{ runner.temp }}/winget-source-builder-action
        submodules: recursive

    - name: Add vcpkg to PATH
      shell: pwsh
      run: |
        if (-not $env:VCPKG_INSTALLATION_ROOT) {
          throw "VCPKG_INSTALLATION_ROOT is not set on this runner."
        }
        $env:VCPKG_INSTALLATION_ROOT | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-pc-windows-msvc

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: ${{ runner.temp }}/winget-source-builder-action -> target

    - name: Build action binary
      shell: pwsh
      run: |
        cargo build --release --target x86_64-pc-windows-msvc --manifest-path "${{ runner.temp }}/winget-source-builder-action/Cargo.toml" --verbose

    - name: Build WinGet source
      shell: pwsh
      env:
        WINGET_SOURCE_BUILDER_WORKSPACE_ROOT: ${{ inputs.workspace-root }}
        WINGET_SOURCE_BUILDER_LANG: ${{ inputs.lang }}
      run: |
        & "${{ runner.temp }}/winget-source-builder-action/target/x86_64-pc-windows-msvc/release/winget-source-builder.exe" build `
          --repo "${{ inputs.repo }}" `
          --state "${{ inputs.state }}" `
          --out "${{ inputs.out }}" `
          --format "${{ inputs.format }}"
